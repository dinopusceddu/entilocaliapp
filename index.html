<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#fcf8f8" />
  <title>Toolbox Funzioni Locali</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#e50611",
            "primary-light": "#ffccd0",
            "primary-dark": "#b0040c",
            "background-light": "#f8f5f6",
            "background-dark": "#230f10",
            "surface-light": "#ffffff",
            "surface-dark": "#2d1b1c",
            "border-light": "#e2e8f0",
            "border-dark": "#3f2e2f",
            "text-light": "#1e293b",
            "text-dark": "#e2e8f0",
            "subtext-light": "#64748b",
            "subtext-dark": "#94a3b8",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"],
            "sans": ["Inter", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>

  <link rel="icon" href="/logo.png">

  <!-- No importmap - dependencies are handled by Vite -->

  <style>
    /* Custom scrollbar for table area */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Input focus rings matching theme */
    input:focus {
      outline: none;
      border-color: #e50611;
      box-shadow: 0 0 0 3px rgba(229, 6, 17, 0.1);
    }

    body {
      font-family: "Inter", sans-serif;
    }
  </style>
</head>

<body class="bg-[#fcf8f8] text-[#1b0e0e]">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="./src/index.tsx" defer></script>
</body>

</html>
